name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements/*.txt
      - run: pip install -r backend/requirements.txt
      - run: ruff check app tests
        working-directory: backend
      - run: black --check app tests
        working-directory: backend
      - run: pytest
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm run format:check
        working-directory: frontend
      - run: npm run test
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker compose build
      - name: Start platform and wait for healthy services
        run: docker compose up --detach --wait
      - name: Verify Sprint 1 foundation
        run: |
          curl --fail --silent http://localhost:3000 > /dev/null
          curl --fail --silent http://localhost:8000/health > /dev/null
          curl --fail --silent http://localhost:8000/docs > /dev/null
          curl --fail --silent http://localhost:8000/openapi.json > /dev/null
          test "$(docker compose exec -T postgres psql -U rise -d rise -tAc 'SELECT count(*) FROM alembic_version')" = "1"
          test "$(docker compose exec -T postgres psql -U rise -d rise -tAc 'SELECT count(*) FROM regions')" = "6"
          test "$(docker compose exec -T postgres psql -U rise -d rise -tAc 'SELECT count(*) FROM countries')" = "14"
      - name: Show container logs after failure
        if: failure()
        run: docker compose logs
      - name: Stop platform
        if: always()
        run: docker compose down --volumes
